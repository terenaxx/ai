<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terenax AI Animasyonlu</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg:#0b0f1a; --panel:#131826; --accent:#00fff7; --accent2:#ff4fff;
    --text:#e0e0e0; --user:#1f2a45; --ai:#1a1f2d; --border:#222840;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:'JetBrains Mono',monospace;}
body{background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;overflow:hidden;}
#header{display:flex;align-items:center;padding:15px 20px;gap:12px;border-bottom:1px solid var(--border);
    background:linear-gradient(90deg, rgba(0,255,247,0.1), rgba(255,79,255,0.1));backdrop-filter:blur(12px);}
.logo{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;justify-content:center;align-items:center;border-radius:8px;color:#fff;font-weight:bold;}
.header-text h1{font-size:16px;color:var(--accent);}
.header-text p{font-size:10px;opacity:0.5;}
.status{margin-left:auto;font-size:11px;color:#22ff8c;}
#chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;}
.msg-wrap{display:flex;flex-direction:column;animation:fadeUp 0.3s ease;}
.msg-wrap.user{align-items:flex-end;}
.msg-wrap.ai{align-items:flex-start;}
.msg-label{font-size:9px;opacity:0.5;margin-bottom:2px;}
.msg{max-width:75%;padding:12px 16px;border-radius:14px;font-size:14px;line-height:1.5;word-wrap:break-word;white-space:pre-wrap;position:relative;}
.msg.user{background:var(--user);color:#fff;border:1px solid rgba(0,255,247,0.2);border-bottom-right-radius:4px;}
.msg.ai{background:var(--ai);border:1px solid var(--border);color:#cdd6e0;border-bottom-left-radius:4px;}
.loader{display:flex;gap:5px;}
.loader span{width:6px;height:6px;background:var(--accent);border-radius:50%;animation:bounce 1.2s infinite;opacity:0.6;}
.loader span:nth-child(2){animation-delay:0.2s;}
.loader span:nth-child(3){animation-delay:0.4s;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:0.4;}40%{transform:translateY(-6px);opacity:1;}}
#input-area{display:flex;padding:12px 16px;border-top:1px solid var(--border);gap:10px;backdrop-filter:blur(12px);}
#in{flex:1;background:var(--panel);border:none;padding:12px 16px;border-radius:24px;color:var(--text);font-size:14px;outline:none;}
#btn{width:46px;height:46px;border:none;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;cursor:pointer;display:flex;justify-content:center;align-items:center;font-size:18px;transition:0.15s;}
#btn:active{transform:scale(0.92);opacity:0.8;}
#btn:disabled{opacity:0.4;cursor:not-allowed;}
</style>
</head>
<body>

<div id="header">
    <div class="logo">⚡</div>
    <div class="header-text">
        <h1>TERENAX AI</h1>
        <p>Made By Terenax</p>
    </div>
    <div class="status">● Online</div>
</div>

<div id="chat"></div>

<div id="input-area">
    <input id="in" placeholder="Mesajınızı yazın...">
    <button id="btn">➤</button>
</div>

<script>
const API_KEY = "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";
const chatEl = document.getElementById("chat");
const inputEl = document.getElementById("in");
const btnEl = document.getElementById("btn");

// Sistem mesajı, AI davranışı
let messages=[{role:"system",content:"Senin adın Terenax AI. Türkçe konuş. Animasyonlu yazma yok. Kurucum sorulduğunda 'Kurucumun Discord Adresi: terenaxhvh' yaz. Kendini tanıtırsan 'Ben Terenax AI. Terenax tarafından kodlandım ve sunuldum.'"}];

function ekle(text,type){
    const wrap=document.createElement("div");
    wrap.className="msg-wrap "+type;
    const label=document.createElement("div");
    label.className="msg-label";
    label.textContent=type==="user"?"SİZ":"TERENAX AI";
    const msg=document.createElement("div");
    msg.className="msg "+type;
    msg.textContent=text;
    wrap.appendChild(label);
    wrap.appendChild(msg);
    chatEl.appendChild(wrap);
    chatEl.scrollTop=chatEl.scrollHeight;
}

async function gonder(){
    const text=inputEl.value.trim();
    if(!text) return;
    ekle(text,"user");
    inputEl.value="";
    btnEl.disabled=true;

    // Özel cevaplar (API çağrısı yapılmaz)
    let reply=null;
    if(/kurucu|creator|sahip/i.test(text)) reply="Kurucumun Discord Adresi: terenaxhvh";
    else if(/sen kimsin|kim|kimdir/i.test(text)) reply="Ben Terenax AI. Terenax tarafından kodlandım ve sunuldum.";

    if(reply){
        ekle(reply,"ai");
        btnEl.disabled=false;
        return;
    }

    // Normal API çağrısı
    messages.push({role:"user",content:text});

    const loader=document.createElement("div");
    loader.className="msg-wrap ai";
    loader.innerHTML=`<div class="msg-label">TERENAX AI</div><div class="msg ai loader"><span></span><span></span><span></span></div>`;
    chatEl.appendChild(loader);
    chatEl.scrollTop=chatEl.scrollHeight;

    try{
        const res=await fetch("https://api.groq.com/openai/v1/chat/completions",{
            method:"POST",
            headers:{
                "Authorization":"Bearer "+API_KEY,
                "Content-Type":"application/json"
            },
            body:JSON.stringify({model:"llama-3.3-70b-versatile",messages:[messages[0],...messages.slice(-10)]})
        });
        const data=await res.json();
        loader.remove();
        if(data.error) ekle("⚠️ "+data.error.message,"ai");
        else{
            const reply=data.choices[0].message.content;
            ekle(reply,"ai");
            messages.push({role:"assistant",content:reply});
        }
    }catch(err){
        loader.remove();
        ekle("⚠️ Hata: "+err.message,"ai");
    }
    btnEl.disabled=false;
}

btnEl.onclick=gonder;
inputEl.addEventListener("keydown",e=>{ if(e.key==="Enter"){ e.preventDefault(); gonder(); } });
</script>

</body>
</html>
