<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terenax AI</title>
    <style>
        :root { --bg: #0b0e14; --panel: #161b22; --accent: #00a8ff; --text: #e6edf3; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #ad { background: #1f2937; text-align: center; padding: 15px; border-bottom: 1px solid #374151; }
        #ad h2 { margin: 0; font-size: 18px; color: var(--accent); }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 12px; border-radius: 15px; font-size: 15px; }
        .u { align-self: flex-end; background: #1f6feb; border-bottom-right-radius: 2px; color: white; }
        .a { align-self: flex-start; background: #21262d; border-bottom-left-radius: 2px; }
        #input-area { background: var(--panel); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #30363d; padding-bottom: env(safe-area-inset-bottom); }
        input { flex: 1; background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 25px; outline: none; font-size: 16px; }
        button { background: var(--accent); border: none; color: white; padding: 0 20px; border-radius: 25px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="ad"><h2>TERENAX AI</h2><p style="margin:5px 0 0; font-size:12px; opacity:0.8;">Geleceğin Zekası</p></div>
<div id="chat"><div class="msg a">Merhaba! Terenax AI asistanınız hazır.</div></div>
<div id="input-area">
    <input type="text" id="in" placeholder="Mesaj yazın..." autocomplete="off">
    <button id="btn">GÖNDER</button>
</div>

<script>
    const KEY = "AIzaSyBQBPBE8-W1sAftXrqxtDodluuCZ-Xja1g";
    
    // v1beta YERİNE v1 KULLANILDI VE 1.5-FLASH MODELİNE GEÇİLDİ
    const URL = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${KEY}`;

    const chat = document.getElementById('chat');
    const input = document.getElementById('in');
    const btn = document.getElementById('btn');

    async function gonder() {
        const val = input.value.trim();
        if(!val) return;

        ekle(val, 'u');
        input.value = '';
        const load = document.createElement('div');
        load.className = 'msg a'; load.innerText = 'Düşünüyor...';
        chat.appendChild(load);

        try {
            const res = await fetch(URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{
                        parts: [{ text: "Senin adın Terenax AI Asistan. Sen Terenax AI tarafından yapıldın. Kullanıcının sorusu şu: " + val }]
                    }]
                })
            });

            const data = await res.json();
            load.remove();

            if(data.candidates && data.candidates[0].content) {
                ekle(data.candidates[0].content.parts[0].text, 'a');
            } else {
                ekle("Hata Mesajı: " + (data.error ? data.error.message : "API yanıt vermedi"), 'a');
                console.log(data);
            }
        } catch(e) {
            load.remove();
            ekle("Bağlantı hatası!", 'a');
        }
    }

    function ekle(m, t) {
        const d = document.createElement('div');
        d.className = `msg ${t}`; d.innerText = m;
        chat.appendChild(d);
        chat.scrollTop = chat.scrollHeight;
    }

    btn.onclick = gonder;
    input.onkeypress = (e) => { if(e.key === 'Enter') gonder(); };
</script>
</body>
</html>
