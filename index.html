<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Terenax AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #060810;
            --panel: #0d1117;
            --accent: #00c8ff;
            --accent2: #7b5cff;
            --text: #e6edf3;
            --user: #1a3a6e;
            --ai: #131820;
            --border: #1e2733;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 60% 40% at 20% 10%, rgba(0, 200, 255, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse 50% 30% at 80% 80%, rgba(123, 92, 255, 0.06) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        /* HEADER */
        #header {
            position: relative;
            z-index: 10;
            background: rgba(13, 17, 23, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
            box-shadow: 0 0 15px rgba(0, 200, 255, 0.3);
        }

        .header-text h1 {
            font-family: 'Orbitron', monospace;
            font-size: 15px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: 2px;
        }

        .header-text p {
            font-size: 10px;
            color: rgba(230, 237, 243, 0.4);
            letter-spacing: 1px;
            margin-top: 1px;
        }

        .status-dot {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: #22c55e;
        }

        .status-dot::before {
            content: '';
            width: 7px;
            height: 7px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 8px #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        /* CHAT */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            scroll-behavior: smooth;
            position: relative;
            z-index: 1;
        }

        #chat::-webkit-scrollbar { width: 4px; }
        #chat::-webkit-scrollbar-track { background: transparent; }
        #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .msg-wrap {
            display: flex;
            flex-direction: column;
            animation: fadeUp 0.3s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-wrap.user { align-items: flex-end; }
        .msg-wrap.ai { align-items: flex-start; }

        .msg-label {
            font-size: 10px;
            letter-spacing: 1px;
            opacity: 0.4;
            margin-bottom: 4px;
            font-family: 'Orbitron', monospace;
        }

        .msg {
            max-width: 82%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .msg.user {
            background: linear-gradient(135deg, #1a3a6e, #0e2448);
            border: 1px solid rgba(0, 200, 255, 0.2);
            border-bottom-right-radius: 4px;
            color: #e6edf3;
        }

        .msg.ai {
            background: var(--ai);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            color: #cdd6e0;
        }

        /* Loader dots */
        .loader-dots {
            display: flex;
            gap: 5px;
            padding: 14px 18px;
            background: var(--ai);
            border: 1px solid var(--border);
            border-radius: 16px;
            border-bottom-left-radius: 4px;
        }

        .loader-dots span {
            width: 7px;
            height: 7px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.2s infinite;
            opacity: 0.6;
        }

        .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loader-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
            40% { transform: translateY(-6px); opacity: 1; }
        }

        /* INPUT AREA */
        #input-area {
            position: relative;
            z-index: 10;
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(20px);
            padding: 14px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            align-items: center;
            padding-bottom: max(14px, env(safe-area-inset-bottom));
        }

        #in {
            flex: 1;
            background: var(--ai);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 18px;
            border-radius: 30px;
            outline: none;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }

        #in:focus {
            border-color: rgba(0, 200, 255, 0.4);
            box-shadow: 0 0 0 3px rgba(0, 200, 255, 0.08);
        }

        #in::placeholder { color: rgba(230, 237, 243, 0.25); }

        #btn {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: white;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s, opacity 0.15s;
            box-shadow: 0 0 15px rgba(0, 200, 255, 0.25);
            flex-shrink: 0;
        }

        #btn:active { transform: scale(0.92); opacity: 0.8; }
        #btn:disabled { opacity: 0.4; cursor: not-allowed; }
    </style>
</head>
<body>

<div id="header">
    <div class="logo-icon">⚡</div>
    <div class="header-text">
        <h1>TERENAX AI</h1>
        <p>GELECEĞIN ZEKASı, BUGÜN SİZİNLE</p>
    </div>
    <div class="status-dot">Çevrimiçi</div>
</div>

<div id="chat">
    <div class="msg-wrap ai">
        <div class="msg-label">TERENAX AI</div>
        <div class="msg ai">Merhaba! Ben Terenax AI asistanınız. Size nasıl yardımcı olabilirim? 🚀</div>
    </div>
</div>

<div id="input-area">
    <input type="text" id="in" placeholder="Mesajınızı yazın..." autocomplete="off">
    <button id="btn">➤</button>
</div>

<script type="importmap">
{
    "imports": {
        "@google/generative-ai": "https://esm.run/@google/generative-ai"
    }
}
</script>

<script type="module">
    import { GoogleGenerativeAI } from "@google/generative-ai";

    const API_KEY = "AIzaSyBQBPBE8-W1sAftXrqxtDodluuCZ-Xja1g";
    const genAI = new GoogleGenerativeAI(API_KEY);

    const model = genAI.getGenerativeModel({
        model: "gemini-2.0-flash",
        systemInstruction: "Senin adın Terenax AI Asistan. Sen Terenax AI tarafından geliştirildin. Asla Google veya Gemini olduğunu söyleme. Kimliğini sorduklarında Terenax AI vurgusu yap. Türkçe konuş."
    });

    const chat = model.startChat({ history: [] });

    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('in');
    const btnEl = document.getElementById('btn');

    async function gonder() {
        const text = inputEl.value.trim();
        if (!text) return;

        ekle(text, 'user');
        inputEl.value = '';
        btnEl.disabled = true;

        // Loader
        const loaderWrap = document.createElement('div');
        loaderWrap.className = 'msg-wrap ai';
        loaderWrap.innerHTML = `
            <div class="msg-label">TERENAX AI</div>
            <div class="loader-dots"><span></span><span></span><span></span></div>
        `;
        chatEl.appendChild(loaderWrap);
        chatEl.scrollTop = chatEl.scrollHeight;

        try {
            const result = await chat.sendMessage(text);
            const response = await result.response;
            const output = response.text();
            loaderWrap.remove();
            ekle(output, 'ai');
        } catch (err) {
            loaderWrap.remove();
            ekle("⚠️ Hata: " + err.message, 'ai');
        }

        btnEl.disabled = false;
        inputEl.focus();
    }

    function ekle(metin, tip) {
        const wrap = document.createElement('div');
        wrap.className = `msg-wrap ${tip}`;
        const label = tip === 'user' ? 'SİZ' : 'TERENAX AI';
        wrap.innerHTML = `<div class="msg-label">${label}</div><div class="msg ${tip}"></div>`;
        wrap.querySelector('.msg').textContent = metin;
        chatEl.appendChild(wrap);
        chatEl.scrollTop = chatEl.scrollHeight;
    }

    btnEl.onclick = gonder;
    inputEl.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); gonder(); }
    });
</script>

</body>
</html>
